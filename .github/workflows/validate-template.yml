name: Validate Template

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  smoke-test:
    name: Template Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x agent-project-template/scripts/*.sh

      - name: Run smoke test
        run: cd agent-project-template && bash scripts/test-template.sh

  validate-json:
    name: Validate JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate settings.json
        run: python -m json.tool agent-project-template/.claude/settings.json > /dev/null
